<!DOCTYPE html>
<html>
<head>
    <title>petruciOS</title>
    <style>
        body {
            margin: 0;
            padding: 0; 
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .window{
            position: absolute;
            background: #f0f0f0;
            border: 2px solid #555;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            display: none;
            z-index: 10;
        }
        .window.active{
            z-index:20;
        }
        .win-title{
            background: linear-gradient(90deg, #e94560, #c23152);
            color: #fff;
            font-size:13px;
            font-weight: bold;
            display:flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            padding: 6px 12px;
        }
        .win-btn{
            display: inline-block;
            width: 14px;
            height:14px;
            background:#ddd;
            border: 1px solid #888;
            text-align: center;
            font-size: 10px;
            line-height: 14px;
            margin-left: 4px;
            cursor: pointer;
        }
        .win-btn:hover{
            background: #bbb;
        }
        .win-body{
            padding: 16px 20px;
        }
        .desk-icon{
            position:absolute;
            text-align: center;
            width: 80px;
            padding: 10px;
            cursor:pointer;
        }
        .desk-icon:hover{
                background: rgba(255,255,255,0.1);
                border-radius: 4px;
            }
            .desk-icon div:last-child{
                color:#ddd;
                font-size: 11px;
                background:rgba(0,0,0,0.4);
                padding: 2px 6px;
            }
            .desk-icon div:first-child{
                font-size: 36px;
                margin-bottom: 4px;
            }
            .cell{
                width:60px;
                height:60px;
                font-size:24px;
                font-weight:bold;
                border:2px solid #555;
                background:#fff;
                cursor:pointer;
                text-align:center;
                vertical-align: middle;
            }
            .cell:hover{
                background:#f5f5f5;
            }
            .note-item{
                padding: 8px 10px;
                border-bottom:1px solid #ddd;
                cursor: default;
                display: flex;
                justify-content: space-between;
                align-items:center;
            }
            .note-item:hover{
                background:#e8e8e8;
            }
            .note-del{
                background:#e94560;
                color:#fff;
                border:none;
                padding: 3px 8px;
                cursor:pointer;
                font-size:11px;
            }
            .note-del:hover{
                background:#c23152;
            }
            
    </style>

</head>
    <body>
    <!-- desktop wallpaper-->
    <div style="background: linear-gradient(145deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%); min-height: 100vh; position: relative;">
    
        <!-- dektop ikons-->
        <div class="desk-icon" style="position: absolute; top: 20px; left: 20px;" onclick="openWindow('notes')">
            <div>📝</div>
            <div>Notes</div>
        </div>

        <div class="desk-icon" style="position: absolute; top:130px; left: 20px;" onclick="openWindow('games')">
            <div>🕹️</div>
            <div>Games</div>
        </div>
        
        <div class="desk-icon" style="position: absolute; top: 240px; left: 20px;" onclick="openWindow('settings')">
            <div>⚙️</div>
            <div>Settings</div>
        </div>

    <!--welcome widndow-->
    <div id="win-welcome" class="window" style="width:460px;top:50%;left:50%;transform:translate(-50%,-60%);display:block;z-index:15;">
        <!--title bar-->
        <div class="win-title">
            <span>welcome to petruciOS</span>
            <div>
                <span class="win-btn">-</span>
                <span class="win-btn">□</span>
                <span class="win-btn" onclick="closeWindow('welcome')">X</span>
            </div>
        </div>
    
    <!-- body -->
    <div class="win-body" style="text-align:center;">
        <div style="width:90px; height:90px; background: #1a1a2e; border: 3px solid #e94560; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 42px; border-radius: 6px;">
            👤
        </div>
        <h1 style="margin: 0 0 4px 0; font-size: 26px; color: #1a1a2e;">Ognjen Petrovic</h1>
        <hr style="border: none; border-top: 1px dashed #ccc; margin: 0 20px 16px;">

        <p style="color: #444; font-size: 13px; line-height: 1.6; margin:0 10px 18px;">
            Welcome to my OS. I build games, write code.
            <span style="font-size: 11px; color: #999;">Raf Challenge 2026 winner</span>
        </p>
        
        <p style="margin:0;">
            <a href="https://github.com/petruci420" style="display:inline-block; background: #1a1a2e; color: #fff; padding: 8px 22px; text-decoration: none; font-size:13px; border:none; margin:0 4px;">GitHub</a>
            <a href="https://instagram.com/petr0vic5" style="display:inline-block; background: #1a1a2e; color: #fff; padding: 8px 22px; text-decoration: none; font-size:13px; border: none; margin:0 4px;">Instagram</a>
        </p>
        </div>
    </div>

    <!--notes app-->
    <div id="win-notes" class="window" style="width:360px;top:80px;left:120px;">
    <div class="win-title">
        <span>📝 Notes</span>
        <div>
            <span class="win-btn">-</span>
            <span class="win-btn">□</span>
            <span class="win-btn" onclick="closeWindow('notes')">X</span>
        </div>
    </div>
    <div class="win-body">
        <textarea id="noteInput" style="width:100%; height:60px; padding: 6px; font-size: 13px; border:1px solid #ccc; resize:none; box-sizing:border-box;" placeholder="Write a note..."></textarea>
        <button onclick="addNote()" style="width:100%; padding: 6px; margin: 6px 0 12px 0; background: #1a1a2e; color:#fff; border:none; cursor:pointer; font-size:13px;">+ Add Note</button>
    <div id="noteList" style="max-height:200px;overflow-y:auto;"></div>
    </div>
    </div>

    <!--tictactoe-->
    <div id="win-games" class="window" style="width:320px;top:140px;left:250px;">
        <div class="win-title">
            <span>🕹️ Tic-Tac-Toe</span>
            <div>
                <span class="win-btn">-</span>
                <span class="win-btn">□</span>
                <span class="win-btn" onclick="closeWindow('games')">X</span>
            </div>
        </div>
        <div class="win-body" style="text-align:center;">
            <p id="turnIndicator" style="color:#444;font-size:14px;margin:0 0 10px 0;">X's turn</p>
            <table style="margin:0 auto;border-collapse:collapse;">
                <tr>
                    <td class="cell" onclick="play(0,0)"></td>
                    <td class="cell" onclick="play(0,1)"></td>
                    <td class="cell" onclick="play(0,2)"></td>
                </tr>
                <tr>
                    <td class="cell" onclick="play(1,0)"></td>
                    <td class="cell" onclick="play(1,1)"></td>
                    <td class="cell" onclick="play(1,2)"></td>
                </tr>
                <tr>
                    <td class="cell" onclick="play(2,0)"></td>
                    <td class="cell" onclick="play(2,1)"></td>
                    <td class="cell" onclick="play(2,2)"></td>
                </tr>
            </table>
            <button onclick="resetTTT()" style="margin-top:12px;padding:6px 18px;background:#e94560;color:#fff;border:none;cursor:pointer;font-size:13px;">New Game</button>
        </div>
    </div>

    <!--settings window-->
    <div id="win-settings" class="window" style="width: 360px; top:120px;left:200px;">
        <div class="win-title">
            <span>⚙️ Settings</span>
            <div>
                <span class="win-btn">-</span>
                <span class="win-btn">□</span>
                <span class="win-btn" onclick="closeWindow('settings')">X</span>
            </div>
        </div>
        <div class="win-body">
            <p style="color:#444; font-size: 13px; margin:0 0 10px 0;"><strong>Desktop Background</strong></p>
            <button onclick="changeBg('#0f0f23','#1a1a3e','#16213e')" style="display:block; width:100%; padding: 6px; margin-bottom:6px; background:#1a1a2e; color:#fff; border:none; cursor:pointer;">🌙Dark Blue</button>
            <button onclick="changeBg('#1a1a1a','#2a2a2a','#0f0f0f')" style="display:block; width:100%; padding: 6px; margin-bottom:6px; background:#333; color:#fff; border:none; cursor:pointer;">⬛Dark Gray</button>
            <button onclick="changeBg('#1a2e1a','#2e4a2e','#0f1f0f')" style="display:block; width:100%; padding: 6px; margin-bottom:6px; background:#1a3a1a; color:#fff; border:none; cursor:pointer;">🌲Forest</button>
            <button onclick="changeBg('#2e1a1a','#4a2a2a','#1f0f0f')" style="display:block; width:100%; padding: 6px; margin-bottom:6px; background:#3a1a1a; color:#fff; border:none; cursor:pointer;">🔥Crismon</button>
        </div>
    </div>

    <!--taskbar-->
    <div style="position: fixed; bottom: 0; left: 0; right:0; background: #0f0f23; border-top: 2px solid #e94560; padding: 6px 16px; display: flex; justify-content: space-between; align-items: center; font-size:12px; color: #ccc;">
        <div style="display: flex; align-items: center; gap:12px;">
           <span style="background: #e94560; color: #fff; padding: 2px 10px; font-weight: bold; font-size:11px; border-radius: 2px;cursor:pointer;" onclick="openWindow('welcome')">START</span>
            <span style="cursor:pointer;" onclick="openWindow('notes')">📝 Notes</span>
            <span style="cursor:pointer;" onclick="openWindow('games')">🕹️ Games</span>
            <span style="cursor:pointer;" onclick="openWindow('settings')">⚙️ Settings</span>
        </div>

        <div>
            <span id="clock" style="color: #aaa;">---:---</span>
        </div>

    </div>
</div>

<script>
    //clock
    function updateClock(){
        var now = new Date();
        var h = now.getHours().toString().padStart(2, '0');
        var m = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock,1000);

    //open / close windows
    function openWindow(name){
        var win = document.getElementById('win-' + name);
        if(win) {
            win.style.display = 'block';
            bringToFront(name);
        }
    }

    function closeWindow(name){
        var win = document.getElementById('win-' + name);
        if (win) win.style.display = 'none';
    }

    function bringToFront(name){
        var wins = document.querySelectorAll('.window');
        wins.forEach(function(w){w.classList.remove('active');});
        var win = document.getElementById('win-'+name);
        if (win) win.classList.add('active');
    }

    //backgroujnd changer

    function changeBg(c1,c2,c3){
        var bg = document.querySelector('[style*="linear-gradient"]');
        if (bg) {
            bg.style.background = 'linear-gradient(145deg, '+ c1 +' 0%, '+c2 + ' 50%, ' + c3 + ' 100%)';
        }
    }

    //dragable windows

    function makeDraggable(winId){
        var win = document.getElementById(winId);
        if(!win) return;
        var title = win.querySelector('.win-title');
        if(!title) return;
        var offsetX, offsetY;
        
        title.addEventListener('mousedown', function(e){
            bringToFront(winId.replace('win-',''));
            offsetX = e.clientX - win.offsetLeft;
            offsetY = e.clientY - win.offsetTop;
            document.addEventListener('mousemove',onMouseMove);
            document.addEventListener('mouseup',onMouseUp);
        });

        function onMouseMove(e){
            win.style.left = (e.clientX - offsetX) + 'px';
            win.style.top = (e.clientY - offsetY) + 'px';
            win.style.transform = 'none';
        }
        function onMouseUp(){
            document.removeEventListener('mousemove',onMouseMove);
            document.removeEventListener('mouseup',onMouseUp);
        }

    }
    makeDraggable('win-welcome');
    makeDraggable('win-notes');
    makeDraggable('win-games');
    makeDraggable('win-settings');

    var ww = document.getElementById('win-welcome');
    if(ww) ww.addEventListener('mousedown',function(){bringToFront('welcome');});
    var wn = document.getElementById('win-notes');
    if(wn) wn.addEventListener('mousedown',function(){bringToFront('notes');});
    var wg = document.getElementById('win-games');
    if(wg) wg.addEventListener('mousedown',function(){bringToFront('games');});
    var ws = document.getElementById('win-settings');
    if(ws) ws.addEventListener('mousedown',function(){bringToFront('settings');});

    // tic-tac-toe
    var board = [['','',''],['','',''],['','','']];
    var turn = 'X';
    var gameOver = false;

    function play(r,c){
        if(gameOver || board[r][c]!='') return;
        board[r][c] = turn;
        var cells = document.querySelectorAll('.cell');
        cells[r*3+c].textContent = turn;
        if(checkWin(turn)){
            document.getElementById('turnIndicator').innerHTML = '<strong>'+turn+' wins!</strong>';
            gameOver = true;
            return;
        }
        if(board.every(function(row){return row.every(function(cell){return cell!='';});})){
            document.getElementById('turnIndicator').textContent = 'Draw!';
            gameOver = true;
            return;
        }
        turn = (turn=='X') ? 'O' : 'X';
        document.getElementById('turnIndicator').textContent = turn+"'s turn";
    }

    function checkWin(p){
        for(var i=0;i<3;i++){
            if(board[i][0]==p && board[i][1]==p && board[i][2]==p) return true;
            if(board[0][i]==p && board[1][i]==p && board[2][i]==p) return true;
        }
        if(board[0][0]==p && board[1][1]==p && board[2][2]==p) return true;
        if(board[0][2]==p && board[1][1]==p && board[2][0]==p) return true;
        return false;
    }

    function resetTTT(){
        board = [['','',''],['','',''],['','','']];
        turn = 'X';
        gameOver = false;
        document.getElementById('turnIndicator').textContent = "X's turn";
        var cells = document.querySelectorAll('.cell');
        cells.forEach(function(c){c.textContent='';});
    }

    // notes app
    var notes = [];

    function addNote(){
        var input = document.getElementById('noteInput');
        var text = input.value.trim();
        if(text==='') return;
        notes.push(text);
        input.value = '';
        renderNotes();
    }

    function deleteNote(index){
        notes.splice(index,1);
        renderNotes();
    }

    function renderNotes(){
        var list = document.getElementById('noteList');
        list.innerHTML = '';
        for(var i=0;i<notes.length;i++){
            var div = document.createElement('div');
            div.className = 'note-item';
            div.innerHTML = '<span>'+notes[i]+'</span><button class="note-del" onclick="deleteNote('+i+')">X</button>';
            list.appendChild(div);
        }
    }

    // enter key to add note
    document.getElementById('noteInput').addEventListener('keyup',function(e){
        if(e.key==='Enter') addNote();
    });

</script>

</body>
</html>
